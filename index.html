<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="HandheldFriendly" content="true">
    <meta charset="utf-8" />
    <link rel="stylesheet" href="globals.css" />
    <link rel="stylesheet" href="style.css" />
    <style>
      html {
        -webkit-text-size-adjust: 100%;
        text-size-adjust: 100%;
        touch-action: manipulation;
      }
      body {
        touch-action: pan-y;
      }
    </style>
    <script>
      function updateDateTime() {
        const now = new Date();

        // Format date as DD-MMM-YYYY
        const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
        const day = String(now.getDate()).padStart(2, '0');
        const month = months[now.getMonth()];
        const year = now.getFullYear();
        document.getElementById('current-date').textContent = `${day}-${month}-${year}`;
        
        // Format time as HH:MM:SS
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('current-time').textContent = `${hours}:${minutes}:${seconds}`;
      }
      
      // Prevent double-tap zoom
      document.addEventListener('dblclick', function(e) {
        e.preventDefault();
      }, { passive: false });
      
      // Update immediately and then every second
      document.addEventListener('DOMContentLoaded', function() {
        updateDateTime();
        setInterval(updateDateTime, 1000);
      });
    </script>
  </head>
  <body>
    <div class="frame" data-model-id="1:2">
      <div class="div">
        <div class="overlap">
          <img class="vector" src="https://c.animaapp.com/lg0au8RQ/img/vector-2.svg" />
          <div class="rectangle"></div>
          <img
            class="screenshot"
            src="https://c.animaapp.com/lg0au8RQ/img/screenshot-2025-07-11-at-8-27-41-pm-1@2x.png"
          />
        </div>
        <div class="overlap-group">
          <div class="rectangle-2"></div>
          <div class="rectangle-3"></div>
          <div class="rectangle-4"></div>
          <img class="logo" src="https://c.animaapp.com/lg0au8RQ/img/logo@2x.png" />
          <div class="text-wrapper">SIMATS TRANSPORTS</div>
        </div>
        <div class="rectangle-5"></div>
        <div class="overlap-2">
          <div class="text-wrapper-2">VALID</div>
          <div class="text-wrapper-3" id="current-time">18:49:52</div>
          <div class="text-wrapper-4" id="current-date">12-JUL-2025</div>
        </div>
        <div class="text-wrapper-5">Kumaran S</div>
        <div class="PUZHAL-CAMPII-wrapper">
          <div class="PUZHAL-CAMPII">   
            <center>PUZHAL CAMP 7B</center> &nbsp;&nbsp;
            </div>
            </div>
        <div class="overlap-3">
          <img class="subtract" src="https://c.animaapp.com/lg0au8RQ/img/subtract.svg" />
          <div class="ellipse"></div>

          <img class="user-prof" src="https://c.animaapp.com/lg0au8RQ/img/user-prof-1@2x.png" />
          <img class="img" src="https://c.animaapp.com/lg0au8RQ/img/f3-1@2x.png" />
        </div>
        <div class="text-wrapper-6">192372048</div>
      </div>
    </div>
  </body>
</html>
